    <title>Tablero Operativo BA</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'ba-yellow': '#FFD100',

    <style>
        .table-header { background-color: #008080; color: white; }
        .table-row-even { background-color: #f9fafb; }

                Chart.register(ChartDataLabels);
            }

            const ctx = document.getElementById('chart' + panelId).getContext('2d');
            chartInstances[panelId] = new Chart(ctx, {
                type: 'bar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, beginAtZero: true }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { mode: 'index', intersect: false },
                        datalabels: {
                            color: 'white',
                            font: { weight: 'bold', size: 10 },
                            formatter: (value) => value > 0 ? value : ''
                        }
                    }
                },
                plugins: [{
                    id: 'totalLabels',
                    afterDatasetsDraw: (chart) => {
                        const ctx = chart.ctx;
                        chart.data.labels.forEach((label, index) => {
                            let total = 0;
                            chart.data.datasets.forEach(ds => total += ds.data[index]);
                            if (total > 0) {
                                const meta = chart.getDatasetMeta(chart.data.datasets.length - 1);
                                const x = meta.data[index].x;
                                const y = meta.data[index].y;
                                ctx.fillStyle = 'black';
                                ctx.font = 'bold 11px Inter';
                                ctx.textAlign = 'center';
                                ctx.fillText(total, x, y - 5);
                            }
                        });
                    }
                }]
            });
        }

        // INICIALIZACIN
        renderTable('table1', 'c2');
        renderTable('table2', 'total');

    </script>
    

</body>
</html>
