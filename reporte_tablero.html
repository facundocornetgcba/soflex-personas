<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Operativo BA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'ba-yellow': '#FFD100',
                        'ba-grey': '#333333',
                        'ba-light': '#F3F4F6'
                    }
                }
            }
        }
    </script>
    <style>
        .table-header { background-color: #008080; color: white; }
        .table-row-even { background-color: #f9fafb; }
        .table-row-odd { background-color: #ffffff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header -->
    <header class="sticky top-0 z-50">
        <div>Actualizado: 01/01/2000 00:00</div>
        <div>Semana: 01 Jan</div>
    </header>

    <main class="container mx-auto p-6 space-y-12">

        <!-- SECCION 1: TABLAS -->
        <section>
            <div id="table1"></div>
            <div id="table2"></div>
        </section>

        <!-- SECCION 2: GRAFICOS -->
        <section>
            <canvas id="dniChart"></canvas>
            <canvas id="dniChart14"></canvas>
        </section>

    </main>

    <script>
        // Datos inyectados desde Python

</body>
</html>
